apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: postgres
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 2
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        cluster-name: postgres
    spec:
      serviceAccountName: patroni
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      containers:
      - name: postgres
        image: ghcr.io/zalando/spilo-17:4.0-p3
        ports:
        - containerPort: 5432
          name: postgres
        - containerPort: 8008
          name: restapi
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: SCOPE
          value: postgres
        - name: PATRONI_SCOPE
          value: postgres
        - name: PATRONI_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: DCS_ENABLE_KUBERNETES_API
          value: "true"
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: KUBERNETES_LABELS
          value: '{"app": "postgres"}'
        - name: KUBERNETES_SCOPE_LABEL
          value: cluster-name
        - name: KUBERNETES_ROLE_LABEL
          value: role
        - name: KUBERNETES_USE_CONFIGMAPS
          value: "true"
        - name: PATRONI_POSTGRESQL_DATA_DIR
          value: /home/postgres/pgdata/pgroot/data
        - name: PATRONI_POSTGRESQL_PGPASS
          value: /tmp/pgpass
        - name: PGPASSWORD_SUPERUSER
          value: postgres_password
        - name: PGPASSWORD_STANDBY
          value: repl_password
        - name: SPILO_CONFIGURATION
          value: |
            bootstrap:
              dcs:
                ttl: 30
                loop_wait: 10
                retry_timeout: 10
                maximum_lag_on_failover: 1048576
                synchronous_mode: true
                synchronous_mode_strict: true
                postgresql:
                  use_pg_rewind: true
                  parameters:
                    max_connections: 100
                    max_wal_senders: 10
                    wal_level: replica
                    synchronous_commit: "on"
                    synchronous_standby_names: "*"
                    shared_buffers: 128MB
                    effective_cache_size: 1GB
              initdb:
              - encoding: UTF8
              - data-checksums
        volumeMounts:
        - name: data
          mountPath: /home/postgres/pgdata
        livenessProbe:
          httpGet:
            path: /liveness
            port: 8008
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readiness
            port: 8008
          initialDelaySeconds: 10
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
